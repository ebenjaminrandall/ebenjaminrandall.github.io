      <stop offset="55%" stop-color="#B4A0D4"/>
      <stop offset="100%" stop-color="#9684B5"/>
    </linearGradient>
    <linearGradient id="gPlum" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C97090"/>
      <stop offset="55%" stop-color="#9D3E5E"/>
      <stop offset="100%" stop-color="#7A2C47"/>
    </linearGradient>
  </defs>
