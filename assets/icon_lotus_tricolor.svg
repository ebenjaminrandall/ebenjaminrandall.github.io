      <stop offset="0%" stop-color="#B8D4E8"/>
      <stop offset="55%" stop-color="#7BAFD4"/>
      <stop offset="100%" stop-color="#5E92B8"/>
    </linearGradient>
    <linearGradient id="gLav" x1="0%" y1="0%" x2="0%" y2="100%">
